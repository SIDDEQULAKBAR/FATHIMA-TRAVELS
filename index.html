<title>Fathima Travels Dashboard</title>

<!-- TAB ICON -->
<link rel="icon" type="image/png"
href="https://drive.google.com/thumbnail?id=1pmF4ThsyuXeMwtmus9N6u3QAYbEoUt_6&sz=w64">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

/* BACKGROUND */

body{

background:
linear-gradient(rgba(10,20,30,0.85),rgba(10,20,30,0.85)),
url("https://drive.google.com/thumbnail?id=1QIKrOfr7cfiL8L1T4jDtmnjGEtzGoebQ&sz=w2000");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;
min-height:100vh;

}

/* FULL WIDTH WRAPPER */

.wrapper{

width:100vw;
margin-left:calc(-50vw + 50%);
padding:40px;

}

/* HEADER */

.header{
text-align:center;
margin-bottom:40px;
}

.header img{
width:320px;
}

/* DASHBOARD GRID */

.dashboard{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:35px;
max-width:1600px;
margin:auto;

}

/* BUTTON STYLE */

.app{

background:rgba(255,255,255,0.08);
border-radius:20px;
padding:40px 20px;
text-align:center;
backdrop-filter:blur(10px);
transition:0.35s;
border:1px solid rgba(255,255,255,0.2);

}

.app:hover{

transform:translateY(-10px) scale(1.05);
background:rgba(255,255,255,0.15);
box-shadow:0 20px 45px rgba(0,0,0,0.6);

}

.app img{
width:65px;
margin-bottom:12px;
}

.app a{
text-decoration:none;
color:white;
font-weight:600;
font-size:16px;
display:block;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:40px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="wrapper">
